<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">
<div class="app">

<!-- 🏠 Home Screen -->
<div id="homeScreen" class="screen">
  <div class="top-bar">
    <div id="userInfo"></div>
  </div>

  <div class="main-content home-content">
    <img
      class="home-game-image"
      src="assets/tic-tac-toe-board.svg"
      alt="Tic Tac Toe board"
    />
  </div>

  <div class="home-actions">
    <button id="playAI" onclick="startAIGame()">Play with Computer</button>
  </div>
</div>
<!-- Game Screen -->
<div id="gameScreen" class="screen hidden">

  <!-- 📊 Status -->
  <h2 id="statusText">Loading...</h2>

  <!-- 👤 Players -->
  <div id="players"></div>

  <!-- 🎯 Game Board -->
  <div id="board"></div>

  <div id="difficultyControl" class="difficulty-control hidden">
    <button id="difficultyTrigger" class="difficulty-trigger" aria-haspopup="listbox" aria-expanded="false">
      <span id="difficultyTriggerText">Difficulty</span>
      <span class="difficulty-arrow" aria-hidden="true">▼</span>
    </button>
    <div id="difficultyDropdown" class="difficulty-dropdown" role="listbox" aria-label="Difficulty">
      <button class="difficulty-option" role="option" data-value="easy">Easy</button>
      <button class="difficulty-option" role="option" data-value="medium">Medium</button>
      <button class="difficulty-option" role="option" data-value="hard">Hard</button>
      <button class="difficulty-option" role="option" data-value="adaptive">Adaptive AI</button>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button id="inviteBtn">Invite</button>
    <button id="restartBtn">Restart</button>
    <button id="homeBtn">Home</button>
  </div>

  <!-- 💬 Chat Box -->
  <div id="chatBox">
    <div id="messages"></div>

    <div class="chat-input">
      <input id="chatInput" placeholder="Type message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

</div>

<!-- ⚙️ Settings Modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="settingsTitle">Settings</h3>

    <div class="settings-row">
      <label for="languageSelect" id="languageLabel">Language</label>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="ar">العربية</option>
        <option value="ru">Русский</option>
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
      </select>
    </div>

    <div class="settings-row">
      <label for="aiModeSelect" id="aiModeLabel">AI Mode</label>
      <select id="aiModeSelect">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
        <option value="adaptive">Adaptive</option>
      </select>
    </div>

    <div class="about-section">
      <h4 id="aboutTitle">About</h4>
      <p id="developerText">Developer: Alok Maurya</p>
      <p>
        <span id="telegramLabel">Telegram:</span>
        <a
          id="aboutTelegramLink"
          class="about-link"
          href="https://t.me/alokmaurya22"
          target="_blank"
          rel="noopener noreferrer"
        >
          @alokmaurya22
        </a>
      </p>
    </div>

    <button id="backHomeBtn">Back to Home</button>
    <button id="closeSettingsBtn">Close</button>
  </div>
</div>

<!-- 👤 Profile Modal -->
<div id="profileModal" class="modal hidden">
  <div class="modal-content profile-modal-content">
    <h3>Player Profile</h3>
    <div class="profile-stats">
      <div class="profile-row"><span>Name</span><strong id="profileNameValue">-</strong></div>
      <div class="profile-row"><span>Total Wins</span><strong id="profileWinsValue">0</strong></div>
      <div class="profile-row"><span>Total Losses</span><strong id="profileLossesValue">0</strong></div>
      <div class="profile-row"><span>Total Draws</span><strong id="profileDrawsValue">0</strong></div>
      <div class="profile-row"><span>Total Games</span><strong id="profileGamesValue">0</strong></div>
      <div class="profile-row"><span>Level</span><strong id="profileLevelValue">0</strong></div>
      <div class="profile-row"><span>XP</span><strong id="profileXpValue">0</strong></div>
      <div class="xp-progress">
        <div class="xp-progress-track">
          <div id="profileXpBarFill" class="xp-progress-fill"></div>
        </div>
        <div id="profileXpPercentValue" class="xp-progress-label">0%</div>
      </div>
    </div>
    <button id="closeProfileBtn">Close</button>
  </div>
</div>

<!-- 💬 Toast -->
<div id="toast"></div>

<!-- ⚔️ Battle Matchmaking Modal -->
<div id="battleModal" class="modal hidden">
  <div class="modal-content battle-modal-content">
    <div class="battle-icon-wrap">⚔️</div>
    <div class="battle-dots">
      <span class="battle-dot"></span>
      <span class="battle-dot"></span>
      <span class="battle-dot"></span>
    </div>
    <h3 id="battleStatusText">Searching for opponent...</h3>
    <p id="battleSubText" class="battle-sub">Finding a random player for you</p>
    <button id="cancelBattleBtn">Cancel</button>
  </div>
</div>

<!-- 🧭 Bottom Navigation -->
<nav class="bottom-nav" id="bottomNav">
  <button class="nav-btn nav-btn-active" id="navHomeBtn">
    <span class="nav-icon">🏠</span>
    <span class="nav-label" id="navHomeLbl">Home</span>
  </button>
  <button class="nav-btn nav-btn-battle" id="navBattleBtn">
    <span class="nav-icon">⚔️</span>
    <span class="nav-label" id="navBattleLbl">Battle</span>
  </button>
  <button class="nav-btn" id="navSettingsBtn">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label" id="navSettingsLbl">Settings</span>
  </button>
</nav>

</div>
</div>

<!-- 📱 Telegram -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<!-- 🧠 Script (load LAST) -->
<script src="script.js"></script>

</body>
</html>
