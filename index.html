<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 Top Bar -->
<div class="top-bar">
  <button id="settingsBtn">⚙️</button>
  <div id="userInfo"></div>
</div>

<!-- 🏠 Home Screen -->
<div id="homeScreen" class="screen">
  <img
    class="home-game-image"
    src="assets/tic-tac-toe-board.svg"
    alt="Tic Tac Toe board"
  />

  <div class="home-actions">
    <button id="createGame">Play with Friend</button>
    <button id="playAI">Play with Computer</button>
  </div>
</div>

<!-- Game Screen -->
<div id="gameScreen" class="screen hidden">

  <!-- 📊 Status -->
  <h2 id="statusText">Loading...</h2>

  <!-- 👤 Players -->
  <div id="players"></div>

  <!-- 🎯 Game Board -->
  <div id="board"></div>

  <!-- Actions -->
  <div class="actions">
    <button id="inviteBtn">Invite</button>
    <button id="restartBtn">Restart</button>
    <button id="homeBtn">Home</button>
  </div>

  <!-- 💬 Chat Box -->
  <div id="chatBox">
    <div id="messages"></div>

    <div class="chat-input">
      <input id="chatInput" placeholder="Type message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

</div>

<!-- ⚙️ Settings Modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="settingsTitle">Settings</h3>

    <div class="settings-row">
      <label for="languageSelect" id="languageLabel">Language</label>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="ar">العربية</option>
        <option value="ru">Русский</option>
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
      </select>
    </div>

    <div class="about-section">
      <h4 id="aboutTitle">About</h4>
      <p id="developerText">Developer: Alok Maurya</p>
      <p>
        <span id="telegramLabel">Telegram:</span>
        <a
          id="aboutTelegramLink"
          class="about-link"
          href="https://t.me/alokmaurya22"
          target="_blank"
          rel="noopener noreferrer"
        >
          @alokmaurya22
        </a>
      </p>
    </div>

    <button id="backHomeBtn">Back to Home</button>
    <button id="closeSettingsBtn">Close</button>
  </div>
</div>

<!-- 💬 Toast -->
<div id="toast"></div>

<!-- 🧑‍💻 Footer -->
<footer class="app-footer">
  Made with ❤️ by
  <a
    id="footerDeveloperLink"
    href="https://t.me/alokmaurya22"
    target="_blank"
    rel="noopener noreferrer"
  >
    Alok Maurya
  </a>
</footer>

<!-- 📱 Telegram -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<!-- 🧠 Script (load LAST) -->
<script src="script.js"></script>

</body>
</html>
