<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">
<div class="app">

<!-- 🏠 Home Screen -->
<div id="homeScreen" class="screen">
  <div class="top-bar">
    <button id="settingsBtn">⚙️</button>
    <div id="userInfo"></div>
  </div>

  <div class="main-content home-content">
    <img
      class="home-game-image"
      src="assets/tic-tac-toe-board.svg"
      alt="Tic Tac Toe board"
    />
  </div>

  <div class="home-actions">
    <button id="createGame">Play with Friend</button>
    <button id="playAI" onclick="startAIGame()">Play with Computer</button>
  </div>
</div>
<!-- Game Screen -->
<div id="gameScreen" class="screen hidden">

  <!-- 📊 Status -->
  <h2 id="statusText">Loading...</h2>

  <!-- 👤 Players -->
  <div id="players"></div>

  <div id="difficultyControl" class="difficulty-control hidden">
    <button id="difficultyBtn" type="button" aria-haspopup="listbox" aria-expanded="false">Difficulty</button>
    <div id="difficultyMenu" class="difficulty-menu hidden" role="listbox" aria-label="Difficulty Levels">
      <button type="button" class="difficulty-option" data-mode="easy" role="option" aria-selected="false">Easy</button>
      <button type="button" class="difficulty-option" data-mode="medium" role="option" aria-selected="false">Medium</button>
      <button type="button" class="difficulty-option" data-mode="hard" role="option" aria-selected="false">Hard</button>
      <button type="button" class="difficulty-option" data-mode="adaptive" role="option" aria-selected="false">Adaptive AI</button>
    </div>
  </div>

  <!-- 🎯 Game Board -->
  <div id="board"></div>

  <!-- Actions -->
  <div class="actions">
    <button id="inviteBtn">Invite</button>
    <button id="restartBtn">Restart</button>
    <button id="homeBtn">Home</button>
  </div>

  <!-- 💬 Chat Box -->
  <div id="chatBox">
    <div id="messages"></div>

    <div class="chat-input">
      <input id="chatInput" placeholder="Type message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

</div>

<!-- ⚙️ Settings Modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="settingsTitle">Settings</h3>

    <div class="settings-row">
      <label for="languageSelect" id="languageLabel">Language</label>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="ar">العربية</option>
        <option value="ru">Русский</option>
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
      </select>
    </div>

    <div class="settings-row">
      <label for="aiModeSelect" id="aiModeLabel">AI Mode</label>
      <select id="aiModeSelect">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
        <option value="adaptive">Adaptive</option>
      </select>
    </div>

    <div class="about-section">
      <h4 id="aboutTitle">About</h4>
      <p id="developerText">Developer: Alok Maurya</p>
      <p>
        <span id="telegramLabel">Telegram:</span>
        <a
          id="aboutTelegramLink"
          class="about-link"
          href="https://t.me/alokmaurya22"
          target="_blank"
          rel="noopener noreferrer"
        >
          @alokmaurya22
        </a>
      </p>
    </div>

    <button id="backHomeBtn">Back to Home</button>
    <button id="closeSettingsBtn">Close</button>
  </div>
</div>

<!-- 👤 Profile Modal -->
<div id="profileModal" class="modal hidden">
  <div class="modal-content profile-modal-content">
    <h3>Player Profile</h3>
    <div class="profile-stats">
      <div class="profile-row"><span>Name</span><strong id="profileNameValue">-</strong></div>
      <div class="profile-row"><span>Total Wins</span><strong id="profileWinsValue">0</strong></div>
      <div class="profile-row"><span>Total Losses</span><strong id="profileLossesValue">0</strong></div>
      <div class="profile-row"><span>Total Draws</span><strong id="profileDrawsValue">0</strong></div>
      <div class="profile-row"><span>Total Games</span><strong id="profileGamesValue">0</strong></div>
      <div class="profile-row"><span>Level</span><strong id="profileLevelValue">0</strong></div>
      <div class="profile-row"><span>XP</span><strong id="profileXpValue">0</strong></div>
      <div class="xp-progress">
        <div class="xp-progress-track">
          <div id="profileXpBarFill" class="xp-progress-fill"></div>
        </div>
        <div id="profileXpPercentValue" class="xp-progress-label">0%</div>
      </div>
    </div>
    <button id="closeProfileBtn">Close</button>
  </div>
</div>

<!-- 💬 Toast -->
<div id="toast"></div>

<!-- 🧑‍💻 Footer -->
<footer class="app-footer">
  Made with ❤️ by
  <a
    id="footerDeveloperLink"
    href="https://t.me/alokmaurya22"
    target="_blank"
    rel="noopener noreferrer"
  >
    Alok Maurya
  </a>
</footer>

</div>
</div>

<!-- 📱 Telegram -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<!-- 🧠 Script (load LAST) -->
<script src="script.js"></script>

</body>
</html>
